apiVersion: v1
kind: ConfigMap
metadata:
  name: learning-backend-config
  namespace: {{ .Values.namespace }}
data:
  CORS_ORIGINS: {{ .Values.backend.corsOrigins | quote }}
  DATABASE_URL: "postgresql+psycopg://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@learning-db:5432/{{ .Values.postgres.database }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: learning-backend
  template:
    metadata:
      labels:
        app: learning-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: learning-backend-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: learning-backend
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: learning-backend
  ports:
    - port: 8000
      targetPort: 8000
