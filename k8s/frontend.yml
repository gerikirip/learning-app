apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-frontend
  namespace: devops-learning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: learning-frontend
  template:
    metadata:
      labels:
        app: learning-frontend
    spec:
      containers:
        - name: frontend
          image: devops-learning-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: learning-frontend
  namespace: devops-learning
spec:
  type: ClusterIP
  selector:
    app: learning-frontend
  ports:
    - port: 80
      targetPort: 80
